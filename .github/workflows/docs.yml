name: Documentation

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/docs.yml"
      - "docs/**"
      - "assets/**"
      - "dootdoot-core/src/**"
      - "dootdoot-core/tests/fixtures/golden/**"
      - "dootdoot-core/tests/fixtures/golden_corpus.tsv"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "package.json"
      - "package-lock.json"
      - "tests/docs-site.test.mjs"

permissions: {}

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build documentation
    # Same defense in depth as CI: canonical repository only, and the trigger
    # set has no `pull_request`, so untrusted fork code can never execute on
    # the self-hosted runner.
    if: github.repository == 'skeswa/dootdoot'
    runs-on: [self-hosted, macOS, ARM64]
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Don't leave the GITHUB_TOKEN behind in .git/config on the
          # persistent self-hosted disk once the job finishes.
          persist-credentials: false

      - name: Install Node.js
        # No `cache: npm` here: the self-hosted Mac persists ~/.npm on local
        # disk, so the network cache would only waste upload bandwidth.
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Pin npm
        # npm minors disagree about which wasi optional-peer entries
        # (@emnapi/* under @napi-rs/wasm-runtime) belong in package-lock.json,
        # and `npm ci` hard-fails on any lockfile its own resolver wouldn't
        # have written ("Missing: @emnapi/* from lock file"). Relying on
        # whatever npm the Node toolchain bundles broke twice (#16, #19), so
        # pin the exact npm that package-lock.json was generated with. When
        # regenerating the lockfile, use this same version:
        #   npx npm@11.16.0 install --package-lock-only
        run: npm install -g npm@11.16.0

      - name: Install dependencies
        run: npm ci

      - name: Install WebAssembly packager
        # A no-op after the first run: cargo skips packages already installed
        # at the requested version.
        run: cargo install wasm-pack --version 0.15.0 --locked

      - name: Test documentation
        run: npm run test:docs

      - name: Ensure GNU tar
        # upload-pages-artifact archives with `gtar`, which GitHub-hosted macOS
        # images provide but a stock Mac does not (BSD tar lacks the
        # --hard-dereference flag the action passes). A no-op after the first
        # run on the persistent runner.
        run: command -v gtar || brew install gnu-tar

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: docs/.vitepress/dist

      - name: Clean self-hosted workspace
        # Persistent runners keep the working tree between jobs. Scrub
        # untracked output (rendered site, wasm artifacts) so it can't leak
        # into the next run; keep target/ and node_modules/ as local build
        # caches. Never fail the job on this.
        if: ${{ always() && runner.environment == 'self-hosted' }}
        run: git clean -ffdx --exclude=target --exclude=node_modules || true

  deploy:
    name: Deploy documentation
    if: github.repository == 'skeswa/dootdoot'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
