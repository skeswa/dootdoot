name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]

# Least privilege by default: every job opts into exactly the scopes it needs.
# With no top-level grant, a compromised step starts from zero.
permissions: {}

# One in-flight CI run per ref; cancel superseded runs so queued jobs can't
# pile up on the single self-hosted Mac.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.os }}
    # Defense in depth: only ever run in the canonical repository. Combined with
    # the manual/push-only triggers above (no `pull_request`), this guarantees
    # untrusted fork code can never execute on the self-hosted runner.
    if: github.repository == 'skeswa/dootdoot'
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: Linux
            runner: ubuntu-latest
          - os: macOS
            runner: [self-hosted, macOS, ARM64]

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Don't leave the GITHUB_TOKEN behind in .git/config on the persistent
          # self-hosted disk once the job finishes.
          persist-credentials: false

      - name: Cache Cargo artifacts
        # GitHub-hosted runners are ephemeral and need the network cache. The
        # self-hosted Mac already persists ~/.cargo and target/ on local disk,
        # so caching there only wastes upload bandwidth.
        if: runner.environment == 'github-hosted'
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Rust toolchain
        run: rustup show

      - name: Install nightly rustfmt
        run: rustup toolchain install nightly --profile minimal --component rustfmt

      - name: Install Linux audio dependencies
        # rodio (playback) links ALSA on Linux; GitHub-hosted Ubuntu lacks the
        # dev headers. macOS uses CoreAudio and needs nothing extra.
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev pkg-config

      - name: Build
        run: cargo build --workspace --all-targets

      - name: Lint
        run: scripts/lint

      - name: Packaging smoke
        run: scripts/package-smoke

      - name: Release packaging smoke
        run: scripts/release-smoke

      - name: Cross-platform Golden WAV determinism
        run: cargo test -p dootdoot-core --test golden_wav

      - name: Test
        run: cargo test

      - name: Clean self-hosted workspace
        # Persistent runners keep the working tree between jobs. Scrub untracked
        # build output (rendered WAVs, temp files) so it can't leak into the next
        # run; keep target/ as the local build cache. Never fail the job on this.
        if: ${{ always() && runner.environment == 'self-hosted' }}
        run: git clean -ffdx --exclude=target || true
